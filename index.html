<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogoCrush</title>
  <meta name="description" content="LogoCrush – match Microsoft cloud product logos in this browser-based match-3 puzzle game. Inspired by Candy Crush, runs entirely in your browser with no install needed.">
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F3F3F3;
      --primary: #0078D4;
      --white: #ffffff;
      --border: #E0E0E0;
      --tile-size: min(10vmin, 64px);
      --gap: min(0.5vmin, 4px);
      /* board-area total height = board grid + board padding (4px×2) + board-area padding (8px×2) */
      --board-full-h: calc(8 * var(--tile-size) + 7 * var(--gap) + 24px);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .screen { width: 100%; max-width: 520px; padding: 1rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    .screen.hidden { display: none !important; }

    h1 { font-size: 2rem; color: var(--primary); text-align: center; }
    h2 { font-size: 1.5rem; color: #333; text-align: center; }
    h3 { font-size: 1rem; color: #555; }
    .section-label { font-size: 1rem; color: #555; }
    p { color: #666; text-align: center; }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #005a9e; }
    .btn-primary:active { transform: scale(0.97); }

    /* Personal bests */
    .pb-display {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pb-item { text-align: center; }
    .pb-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); display: block; }
    .pb-label { font-size: 0.7rem; color: #666; text-transform: uppercase; }

    /* Mode selector */
    #modeSelector {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
    }
    #modeSelector button {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      color: #444;
    }
    #modeSelector button[aria-pressed="true"] {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    /* Playing screen layout */
    #screen-playing {
      max-width: 100%;
      padding: 0;
      gap: 0;
      align-items: stretch;
    }
    header {
      width: 100%;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .game-title { font-weight: 700; font-size: 1rem; color: var(--primary); flex: 1; }

    #tag-badge {
      font-size: 0.75rem;
      background: #e8f0fe;
      color: var(--primary);
      border-radius: 12px;
      padding: 0.2rem 0.7rem;
      font-weight: 600;
      flex: 0 0 auto;
    }

    /* Game area: board column + stats panel */
    #game-area {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
    }

    /* Board column: game board + hint button */
    #board-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    /* Board */
    #board-area {
      padding: 8px;
      background: #162b45;
      border-radius: 14px;
      display: flex;
      flex-shrink: 0;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, var(--tile-size));
      grid-template-rows: repeat(8, var(--tile-size));
      gap: var(--gap);
      padding: 4px;
      background: #0f2744;
      border-radius: 10px;
      touch-action: none;
      user-select: none;
    }

    /* Hint button */
    #hint-row { width: 100%; display: flex; justify-content: center; }
    .btn-hint {
      background: #16213e;
      color: #ffd700;
      border: 2px solid #ffd700;
      border-radius: 10px;
      padding: 0.5rem 2.2rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }
    .btn-hint:hover { background: #ffd700; color: #000; }
    .btn-hint:active { transform: scale(0.96); }
    .btn-hint:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Stats panel — Candy Crush–inspired side panel */
    #stats-panel {
      height: var(--board-full-h);
      width: calc(var(--board-full-h) / 3);
      min-width: 90px;
      background: linear-gradient(175deg, #1e3d6b 0%, #0d1f38 55%, #06111f 100%);
      border: 1px solid rgba(100,160,255,0.18);
      border-radius: 14px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 8px 0;
      gap: 6px;
      position: relative;
      flex-shrink: 0;
      overflow: visible;
    }
    /* Subtle top sheen */
    #stats-panel::after {
      content: '';
      position: absolute;
      top: 0; left: 12px; right: 12px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
      pointer-events: none;
    }

    /* Moves counter — CC-style circular badge */
    #hud-moves-wrap {
      flex-shrink: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      gap: 4px;
    }
    #moves-display {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 42% 33%, #ff7b33 0%, #c0392b 62%, #8e1a10 100%);
      border: 3px solid rgba(255,255,255,0.22);
      box-shadow: 0 0 0 3px rgba(255,80,0,0.28), 0 5px 16px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.55);
      line-height: 1;
    }
    .hud-moves-label {
      font-size: 0.52rem;
      font-weight: 700;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Timer — styled pill */
    #hud-timer-wrap {
      flex-shrink: 0;
      text-align: center;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 4px 10px;
      width: 100%;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.35);
    }
    #timer-display {
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      text-shadow: 0 0 10px rgba(255,255,255,0.22);
    }
    @keyframes timerPulse { from { opacity: 1; } to { opacity: 0.45; } }
    #timer-display.timer-warning {
      color: #ff4444;
      animation: timerPulse 0.5s ease-in-out infinite alternate;
    }

    /* Jar region */
    #jar-region {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      min-height: 0;
      padding: 0 2px;
      margin-bottom: 26px; /* paper label overlaps jar bottom by (40-26)=14px */
    }
    #progress-jar {
      flex: 2;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 6px 6px 12px 12px;
      background: rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }
    /* Full-height fill; scaleY from bottom: transparent at 0%, golden at 100% */
    #progress-jar-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100%;
      background: linear-gradient(to top,
        rgba(180, 120, 0, 0.85) 0%,
        rgba(220, 160, 0, 0.9)  40%,
        rgba(255, 200, 0, 0.95) 70%,
        rgba(255, 215, 0, 1)    100%);
      transform: scaleY(0);
      transform-origin: bottom center;
      transition: transform 0.5s ease;
    }

    /* Ruler (right side of jar) */
    #jar-ruler {
      flex: 1;
      position: relative;
      margin-left: 4px;
    }
    /* Invisible left spacer — mirrors the ruler so the jar is truly centred */
    #jar-region::before {
      content: '';
      flex: 1;
    }
    /* Target mark — fixed at top */
    #jar-mark-target {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      transform: translateY(-50%);
    }
    /* Current score mark — moves as score rises */
    #jar-mark-current {
      position: absolute;
      top: 100%; left: 0; right: 0;
      display: flex;
      align-items: center;
      transform: translateY(-50%);
      transition: top 0.5s ease;
    }
    .mark-tick { width: 18px; height: 3px; flex-shrink: 0; border-radius: 2px; }
    #jar-mark-target .mark-tick { background: #ffd700; }
    #jar-mark-current .mark-tick { background: #00e5ff; }
    .mark-label {
      font-size: 0.72rem;
      font-weight: 900;
      padding-left: 4px;
      white-space: nowrap;
      line-height: 1;
    }
    #jar-mark-target .mark-label { color: #ffd700; }
    #jar-mark-current .mark-label { color: #00e5ff; }

    /* Level badge — CC-style bottom badge */
    #level-label-paper {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: linear-gradient(180deg, #1a5fa0 0%, #0d3870 100%);
      border-top: 2px solid rgba(255,255,255,0.14);
      border-radius: 10px 10px 14px 14px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35em;
      font-weight: 800;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      box-shadow: 0 -4px 14px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    #progress-level-num { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.55); }

    @media (max-width: 640px) {
      #game-area { flex-direction: column; align-items: center; padding: 0.5rem; gap: 0.5rem; }
      #stats-panel {
        width: 100%;
        height: auto;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        padding: 8px 12px;
        gap: 10px 20px;
        border-radius: 10px;
      }
      #jar-region { display: none; }
      #level-label-paper {
        position: static;
        height: auto;
        padding: 4px 14px;
        border-radius: 8px;
        box-shadow: none;
      }
    }

    .tile {
      width: var(--tile-size);
      height: var(--tile-size);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
      overflow: hidden;
      position: relative;
    }
    .tile img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      pointer-events: none;
      display: block;
    }
    .tile:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
    .tile.selected {
      border: 2px solid var(--primary);
      transform: scale(1.05);
      z-index: 2;
    }
    .tile.special-rowclear {
      background: #ffd700;
      border: 2px solid #ff8c00;
      box-shadow: 0 0 10px 3px rgba(255, 165, 0, 0.55);
    }
    .tile.special-bomb {
      background: #ffd700;
      border: 2px solid #ff4500;
      box-shadow: 0 0 12px 4px rgba(255, 69, 0, 0.6);
    }

    /* Animations */
    @keyframes tileMatch {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.7; }
      100% { transform: scale(0); opacity: 0; }
    }
    @keyframes tileNew {
      0% { transform: translateY(-20px) scale(0.5); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes scorePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); color: #ff8c00; }
      100% { transform: scale(1); }
    }
    @keyframes tileBounce {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .tile.anim-match { animation: tileMatch 0.3s ease-out forwards; }
    .tile.anim-new { animation: tileNew 0.2s ease-out forwards; }
    .tile.anim-bounce { animation: tileBounce 0.25s ease-in-out; }
    .score-pulse { animation: scorePulse 0.4s ease-in-out; }

    @keyframes tileHighlight {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(255,140,0,0); }
      50% { transform: scale(1.1); box-shadow: 0 0 0 3px rgba(255,140,0,0.9), 0 0 14px 5px rgba(255,140,0,0.45); }
    }
    .tile.anim-highlight { animation: tileHighlight 0.28s ease-in-out; z-index: 3; }

    @keyframes tileFall {
      0% { transform: translateY(calc(-1 * var(--tile-size) * var(--fall-rows, 1))); opacity: 0.7; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .tile.anim-fall { animation: tileFall 0.25s ease-in forwards; }

    .tile-score-popup {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: calc(var(--tile-size) * 0.38);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 6px rgba(0,0,0,0.7), 0 1px 3px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      animation: scoreFloat 1.1s ease-out forwards;
    }
    @keyframes scoreFloat {
      0%   { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
      45%  { transform: translate(-50%, -50%) scale(1.1);  opacity: 1; }
      100% { transform: translate(-50%, -130%) scale(0.85); opacity: 0; }
    }
    .board-bonus-popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3.2rem;
      font-weight: 900;
      color: #fff;
      background: rgba(0,0,0,0.78);
      padding: 0.35rem 1.1rem;
      border-radius: 14px;
      border: 2px solid #ff8c00;
      text-shadow: 0 0 18px #ff8c00, 0 0 36px rgba(255,140,0,0.5);
      z-index: 100;
      pointer-events: none;
      animation: bonusPop 1.3s ease-out forwards;
    }
    @keyframes bonusPop {
      0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      15%  { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      70%  { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    @keyframes tileHint {
      0%, 100% { box-shadow: 0 0 0 2px #00e5ff, 0 0 10px 4px rgba(0,229,255,0.35); }
      50%       { box-shadow: 0 0 0 3px #00e5ff, 0 0 22px 9px rgba(0,229,255,0.65); transform: scale(1.09); }
    }
    .tile.anim-hint { animation: tileHint 0.65s ease-in-out infinite; z-index: 4; }

    @keyframes specialShake {
      0%, 100% { transform: rotate(0deg) scale(1); }
      18%  { transform: rotate(-9deg) scale(1.07); }
      36%  { transform: rotate(9deg)  scale(1.1);  }
      54%  { transform: rotate(-6deg) scale(1.06); }
      72%  { transform: rotate(6deg)  scale(1.07); }
      88%  { transform: rotate(-2deg) scale(1.03); }
    }
    .tile.anim-special-shake { animation: specialShake 0.5s ease-in-out; z-index: 3; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .modal-overlay.hidden { display: none !important; }
    .modal-box {
      background: white; border-radius: 12px; padding: 1.5rem;
      max-width: 320px; width: 90%; text-align: center;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .modal-title { font-size: 1.2rem; font-weight: 700; color: #333; }
    .modal-body { color: #666; font-size: 0.9rem; }
    .modal-buttons { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn-secondary { background: white; color: var(--primary); border: 1px solid var(--primary); border-radius: 8px; padding: 0.6rem 1.2rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .btn-danger { background: #d83b01; color: white; border: none; border-radius: 8px; padding: 0.6rem 1.2rem; font-size: 0.95rem; font-weight: 700; cursor: pointer; }

    /* Menu button */
    .btn-menu { background: white; color: var(--primary); border: 1px solid var(--primary); border-radius: 6px; padding: 0.3rem 0.7rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; }

    @media (prefers-reduced-motion: reduce) {
      .tile, .tile.anim-match, .tile.anim-new, .tile.anim-bounce, .tile.anim-fall, .tile.anim-highlight, .tile.anim-hint, .tile.anim-special-shake, .score-pulse {
        animation: none !important;
        transition: none !important;
      }
    }

    /* Level summary & game over */
    #screen-level-summary, #screen-game-over {
      justify-content: center;
      min-height: 60vh;
      gap: 1.2rem;
    }
    .summary-stat { display: flex; justify-content: space-between; width: 100%; max-width: 300px; font-size: 0.95rem; padding: 0.3rem 0; border-bottom: 1px solid var(--border); }
    .summary-stat strong { color: var(--primary); }
    #summary-timer { font-size: 0.8rem; color: #666; }

    /* Emoji decorations */
    .emoji-big { font-size: 3rem; }

    /* hits.sh visit counter badge */
    .hits-badge { height: 20px; border-radius: 4px; }
  </style>
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start" class="screen">
  <h1>LogoCrush 🎮</h1>
  <p>The Microsoft cloud logo match-3 game</p>

  <div class="pb-display">
    <div class="pb-item">
      <span class="pb-value" id="pb-highscore">0</span>
      <span class="pb-label">Best Score</span>
    </div>
    <div class="pb-item">
      <span class="pb-value" id="pb-level">1</span>
      <span class="pb-label">Best Level</span>
    </div>
    <div class="pb-item">
      <span class="pb-value" id="pb-games">0</span>
      <span class="pb-label">Games</span>
    </div>
    <div class="pb-item">
      <span class="pb-value" id="pb-logos">0</span>
      <span class="pb-label">Logos Cleared</span>
    </div>
  </div>

  <h2 class="section-label">Your Cloud</h2>
  <div id="modeSelector" role="group" aria-label="Your Cloud filter">
    <button data-tag="all" aria-pressed="true">All</button>
    <button data-tag="azure" aria-pressed="false">Azure</button>
    <button data-tag="m365" aria-pressed="false">M365</button>
    <button data-tag="power-platform" aria-pressed="false">Power Platform</button>
    <button data-tag="dynamics" aria-pressed="false">Dynamics</button>
    <button data-tag="security" aria-pressed="false">Security</button>
    <button data-tag="modern-workplace" aria-pressed="false">Modern Workplace</button>
  </div>

  <button id="btn-play" class="btn-primary">Play!</button>
  <img src="https://hits.sh/fordosa90.github.io/logocrush.github.io.svg?label=Visits&color=0078D4&style=flat-square" alt="Visit counter" class="hits-badge">
</div>
<div id="screen-playing" class="screen hidden">
  <header>
    <button id="btn-menu" class="btn-menu">⬅ Menu</button>
    <span class="game-title">LogoCrush 🎮</span>
    <div id="tag-badge"></div>
  </header>
  <div id="game-area">
    <div id="board-column">
      <div id="board-area">
        <div id="board" role="grid" aria-label="Game board"></div>
      </div>
      <div id="hint-row">
        <button id="btn-hint" class="btn-hint">💡 Hint</button>
      </div>
    </div>
    <div id="stats-panel">
      <div id="hud-moves-wrap">
        <div id="moves-display">30</div>
        <span class="hud-moves-label">moves left</span>
      </div>
      <div id="hud-timer-wrap">
        <div id="timer-display">5:00</div>
      </div>
      <div id="jar-region">
        <div id="progress-jar">
          <div id="progress-jar-fill"></div>
        </div>
        <div id="jar-ruler">
          <div id="jar-mark-target">
            <div class="mark-tick"></div>
            <div id="jar-target-score" class="mark-label"></div>
          </div>
          <div id="jar-mark-current">
            <div class="mark-tick"></div>
            <div id="jar-current-score" class="mark-label"></div>
          </div>
        </div>
      </div>
      <div id="level-label-paper">LEVEL <span id="progress-level-num">1</span></div>
    </div>
  </div>
</div>

<!-- MODAL OVERLAY -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-buttons" id="modal-buttons"></div>
  </div>
</div>

<!-- LEVEL SUMMARY SCREEN -->
<div id="screen-level-summary" class="screen hidden">
  <div class="emoji-big" id="summary-emoji">🎉</div>
  <h2 id="summary-title">Level Complete!</h2>
  <div id="summary-stats"></div>
  <div id="summary-timer"></div>
  <button id="btn-next-level" class="btn-primary">Next Level →</button>
</div>

<!-- GAME OVER SCREEN -->
<div id="screen-game-over" class="screen hidden">
  <div class="emoji-big">😔</div>
  <h2>Game Over</h2>
  <div id="gameover-stats"></div>
  <button id="btn-play-again" class="btn-primary">Play Again</button>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const LS_HIGHSCORE   = 'logocrush_highscore';
const LS_HIGHESTLEVEL = 'logocrush_highestlevel';
const LS_TOTALGAMES  = 'logocrush_totalgames';
const LS_TOTALLOGOS  = 'logocrush_totallogos';
const LS_ACTIVETAG   = 'logocrush_activetag';

const PER_TILE_PTS             = 100;   // base score per matched tile
const INITIAL_TIME_SECONDS     = 300;   // 5 minutes per level
const HINT_ANIMATION_MS        = 2500;  // how long hint tiles glow (~3.8 × 0.65 s cycles)
const SWAP_ANIMATION_MS        = 180;   // tile swap slide duration (ms)
const SPECIAL_SHAKE_INTERVAL_MS  = 1300; // how often to check for special-tile shakes
const SPECIAL_SHAKE_PROBABILITY  = 0.28; // chance each eligible tile shakes per interval

// ─── State ───────────────────────────────────────────────────────────────────
let allIcons = []; // loaded from manifest.json

let state = {
  board: [],
  level: 1,
  score: 0,
  movesLeft: 20,
  scoreTarget: 1000,
  selectedCell: null,
  activePool: [],
  activeTag: 'all',
  isAnimating: false,
  comboCount: 0,
  totalClearedThisLevel: 0,
};

let gameTimerInterval = null;
let specialShakeInterval = null;
let timeRemaining = 240;

// ─── Utilities ────────────────────────────────────────────────────────────────
function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ─── Modal helpers ────────────────────────────────────────────────────────────
function showModal(title, body, buttons) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  const btns = document.getElementById('modal-buttons');
  btns.innerHTML = '';
  for (const btn of buttons) {
    const el = document.createElement('button');
    el.textContent = btn.label;
    el.className = btn.className;
    el.addEventListener('click', () => {
      hideModal();
      btn.action();
    });
    btns.appendChild(el);
  }
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function hideModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

// ─── Timer helpers ────────────────────────────────────────────────────────────
function stopGameTimer() {
  if (gameTimerInterval) {
    clearInterval(gameTimerInterval);
    gameTimerInterval = null;
  }
  stopSpecialShake();
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ─── Manifest loading ─────────────────────────────────────────────────────────
const FALLBACK_ICONS = [
  {id:'azure',name:'Azure',file:'icons/azure.svg',tags:['azure']},
  {id:'teams',name:'Teams',file:'icons/teams.svg',tags:['m365','modern-workplace']},
  {id:'github',name:'GitHub',file:'icons/github.svg',tags:['developer']},
  {id:'word',name:'Word',file:'icons/word.svg',tags:['m365']},
  {id:'excel',name:'Excel',file:'icons/excel.svg',tags:['m365','data']},
  {id:'power-bi',name:'Power BI',file:'icons/power-bi.svg',tags:['power-platform','data','m365']},
  {id:'sharepoint',name:'SharePoint',file:'icons/sharepoint.svg',tags:['m365','modern-workplace']},
  {id:'onedrive',name:'OneDrive',file:'icons/onedrive.svg',tags:['m365','modern-workplace']},
];

async function loadManifest() {
  try {
    const res = await fetch('manifest.json');
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (Array.isArray(data.icons) && data.icons.length >= 6) {
      allIcons = data.icons;
      return;
    }
    throw new Error('invalid manifest');
  } catch (e) {
    console.warn('manifest.json load failed, using fallback:', e.message);
    allIcons = FALLBACK_ICONS;
  }
}

// ─── Level config ─────────────────────────────────────────────────────────────
function getLevelConfig(level) {
  return {
    // Much higher targets: level 1 needs ~17 good matches, grows by 2500 each level
    target: 5000 + (level - 1) * 2500,
    // More moves per level; decreases slowly
    moves: Math.max(20, 30 - Math.floor((level - 1) / 2)),
  };
}

// ─── Pool building ────────────────────────────────────────────────────────────
function buildPool(tag, level) {
  let filtered = tag === 'all' ? allIcons.slice() : allIcons.filter(ic => ic.tags.includes(tag));
  if (filtered.length < 6) {
    const ids = new Set(filtered.map(ic => ic.id));
    const extra = shuffle(allIcons.filter(ic => !ids.has(ic.id)));
    filtered = filtered.concat(extra);
  }

  // Hue-based diversity selection
  const withHue = filtered.filter(ic => ic.hue !== undefined);

  let chosen;
  if (withHue.length >= 6) {
    const sorted = withHue.slice().sort((a, b) => a.hue - b.hue);
    if (!level || level <= 2) {
      // Max diversity: sample evenly across hue wheel
      const step = sorted.length / 6;
      chosen = [];
      for (let i = 0; i < 6; i++) {
        chosen.push(sorted[Math.floor(i * step)]);
      }
    } else if (level <= 4) {
      // Moderate: sample randomly
      chosen = shuffle(sorted).slice(0, 6);
    } else {
      // Similar hues: pick a random center hue, then progressively narrow the pool
      // as level rises so icons become ever more confusingly similar.
      // Pool shrinks from 14 candidates (level 5, wide band) down to 6 (level 11+, tightest band).
      // poolSize = max(MIN_POOL, MAX_POOL - floor((level - 5) * SCALE))
      // Level 5→14, 6→13, 7→11, 8→10, 9→8, 10→7, 11+→6
      const MIN_POOL = 6;
      const MAX_POOL = 14;
      const POOL_SCALE = 1.5;
      const centerHue = Math.random() * 360;
      const withDist = sorted.map(ic => {
        const d = Math.abs(ic.hue - centerHue);
        return { ic, dist: Math.min(d, 360 - d) };
      });
      withDist.sort((a, b) => a.dist - b.dist);
      const poolSize = Math.max(MIN_POOL, MAX_POOL - Math.floor((level - 5) * POOL_SCALE));
      chosen = shuffle(withDist.slice(0, poolSize)).slice(0, 6).map(x => x.ic);
    }
  } else {
    chosen = shuffle(filtered).slice(0, 6);
  }

  return chosen.slice(0, 6);
}

// ─── Board init ───────────────────────────────────────────────────────────────
function randomTile() {
  const icon = randItem(state.activePool);
  return { iconId: icon.id, type: 'normal' };
}

function initBoard() {
  state.board = [];
  for (let r = 0; r < 8; r++) {
    state.board[r] = [];
    for (let c = 0; c < 8; c++) {
      state.board[r][c] = randomTile();
    }
  }
  resolveInitialMatches();
}

function resolveInitialMatches() {
  let found = true;
  let iterations = 0;
  while (found && iterations < 200) {
    iterations++;
    found = false;
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        const id = state.board[r][c].iconId;
        const hMatch = c >= 2 &&
          state.board[r][c-1].iconId === id &&
          state.board[r][c-2].iconId === id;
        const vMatch = r >= 2 &&
          state.board[r-1][c].iconId === id &&
          state.board[r-2][c].iconId === id;
        if (hMatch || vMatch) {
          state.board[r][c] = randomTile();
          found = true;
        }
      }
    }
  }
}

// ─── Level init ───────────────────────────────────────────────────────────────
function initLevel(level) {
  const cfg = getLevelConfig(level);
  state.level = level;
  state.score = 0;
  state.movesLeft = cfg.moves;
  state.scoreTarget = cfg.target;
  state.selectedCell = null;
  state.isAnimating = false;
  state.comboCount = 0;
  state.totalClearedThisLevel = 0;
  state.activePool = buildPool(state.activeTag, state.level);

  stopGameTimer();
  timeRemaining = INITIAL_TIME_SECONDS;

  initBoard();
  renderBoard();
  updateHUD();
  startSpecialShake();

  gameTimerInterval = setInterval(() => {
    timeRemaining--;
    updateHUD();
    if (timeRemaining <= 0) {
      stopGameTimer();
      state.isAnimating = true;
      showModal(
        "⏱ Time's Up!",
        "You ran out of time!",
        [
          { label: 'Restart Level', className: 'btn-primary', action: () => { state.isAnimating = false; initLevel(state.level); showScreen('screen-playing'); } },
          { label: 'Back to Menu', className: 'btn-secondary', action: () => { state.isAnimating = false; showScreen('screen-start'); loadPersonalBests(); } },
        ]
      );
    }
  }, 1000);
}

// ─── Match detection ──────────────────────────────────────────────────────────
// Returns Map<"r,c", {iconId, type, isSpecial, specialAction}>
function findMatches() {
  const matched = new Map(); // key "r,c" -> cell info
  const specialCreate = new Map(); // key "r,c" -> 'rowclear' | 'bomb'

  // Horizontal runs
  for (let r = 0; r < 8; r++) {
    let c = 0;
    while (c < 8) {
      if (!state.board[r][c]) { c++; continue; }
      const id = state.board[r][c].iconId;
      let len = 1;
      while (c + len < 8 && state.board[r][c + len] && state.board[r][c + len].iconId === id) len++;
      if (len >= 3) {
        for (let k = 0; k < len; k++) {
          const key = `${r},${c+k}`;
          matched.set(key, { ...state.board[r][c+k] });
        }
        if (len === 4) {
          specialCreate.set(`${r},${c+len-1}`, 'rowclear');
        } else if (len >= 5) {
          specialCreate.set(`${r},${c+len-1}`, 'bomb');
        }
      }
      c += len;
    }
  }

  // Vertical runs
  for (let c = 0; c < 8; c++) {
    let r = 0;
    while (r < 8) {
      if (!state.board[r][c]) { r++; continue; }
      const id = state.board[r][c].iconId;
      let len = 1;
      while (r + len < 8 && state.board[r+len][c] && state.board[r+len][c].iconId === id) len++;
      if (len >= 3) {
        for (let k = 0; k < len; k++) {
          const key = `${r+k},${c}`;
          // Check if already in horizontal match → L/T shape → bomb
          if (matched.has(key)) {
            specialCreate.set(key, 'bomb');
          }
          matched.set(key, { ...state.board[r+k][c] });
        }
        if (len === 4) {
          if (!specialCreate.has(`${r+len-1},${c}`)) {
            specialCreate.set(`${r+len-1},${c}`, 'rowclear');
          }
        } else if (len >= 5) {
          specialCreate.set(`${r+len-1},${c}`, 'bomb');
        }
      }
      r += len;
    }
  }

  // Tag matched cells with their special creation intent
  for (const [key, stype] of specialCreate) {
    if (matched.has(key)) {
      const cell = matched.get(key);
      cell.createSpecial = stype;
      matched.set(key, cell);
    }
  }

  return matched;
}

// ─── Special tile activation ──────────────────────────────────────────────────
function expandMatchesForSpecials(matches) {
  const extraKeys = new Set();
  for (const key of matches.keys()) {
    const [r, c] = key.split(',').map(Number);
    const tile = state.board[r][c];
    if (!tile) continue;

    if (tile.type === 'rowclear') {
      for (let cc = 0; cc < 8; cc++) {
        if (state.board[r][cc]) extraKeys.add(`${r},${cc}`);
      }
    } else if (tile.type === 'bomb') {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && state.board[nr][nc]) {
            extraKeys.add(`${nr},${nc}`);
          }
        }
      }
    }
  }
  let extraCount = 0;
  for (const key of extraKeys) {
    if (!matches.has(key)) {
      const [r, c] = key.split(',').map(Number);
      if (state.board[r][c]) {
        matches.set(key, { ...state.board[r][c] });
        extraCount++;
      }
    }
  }
  return extraCount;
}

// ─── Gravity & fill ───────────────────────────────────────────────────────────
function applyGravity() {
  for (let c = 0; c < 8; c++) {
    const col = [];
    for (let r = 0; r < 8; r++) {
      if (state.board[r][c] !== null) col.push(state.board[r][c]);
    }
    const nulls = 8 - col.length;
    for (let r = 0; r < 8; r++) {
      state.board[r][c] = r < nulls ? null : col[r - nulls];
    }
  }
}

function fillNewTiles() {
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (state.board[r][c] === null) {
        state.board[r][c] = randomTile();
      }
    }
  }
}

// ─── Process matches (async game loop) ────────────────────────────────────────
async function processMatches(matches) {
  const extraCount = expandMatchesForSpecials(matches);

  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Scoring: each matched tile is worth PER_TILE_PTS, multiplied by (comboCount + 1).
  const specialBonus = extraCount * 200;
  const baseScore = matches.size * PER_TILE_PTS * (state.comboCount + 1);
  const earned = baseScore + specialBonus;
  const comboDisplayBonus = matches.size * PER_TILE_PTS * state.comboCount;

  const tileEls = document.querySelectorAll('.tile');

  if (!prefersReduced) {
    // Phase 1: Highlight matched tiles so the player can see the combo
    for (const key of matches.keys()) {
      const [r, c] = key.split(',').map(Number);
      const el = tileEls[r * 8 + c];
      if (el) el.classList.add('anim-highlight');
    }
    await delay(280);
    for (const key of matches.keys()) {
      const [r, c] = key.split(',').map(Number);
      const el = tileEls[r * 8 + c];
      if (el) el.classList.remove('anim-highlight');
    }

    // Phase 2: Show score popups on the matched tiles while they are still visible
    const popups = [];
    for (const key of matches.keys()) {
      const [r, c] = key.split(',').map(Number);
      const tileEl = tileEls[r * 8 + c];
      if (tileEl) {
        const popup = document.createElement('div');
        popup.className = 'tile-score-popup';
        popup.textContent = `+${PER_TILE_PTS}`;
        tileEl.appendChild(popup);
        popups.push(popup);
      }
    }
    const totalBonus = comboDisplayBonus + specialBonus;
    if (totalBonus > 0) {
      const bonusEl = document.createElement('div');
      bonusEl.className = 'board-bonus-popup';
      bonusEl.textContent = `+${totalBonus} BONUS!`;
      document.body.appendChild(bonusEl);
      setTimeout(() => bonusEl.remove(), 1400);
    }

    // Phase 3: Animate matched tiles shrinking/disappearing
    const animPromises = [];
    for (const key of matches.keys()) {
      const [r, c] = key.split(',').map(Number);
      const el = tileEls[r * 8 + c];
      if (el) {
        el.classList.add('anim-match');
        animPromises.push(new Promise(res => {
          el.addEventListener('animationend', res, { once: true });
        }));
      }
    }
    await Promise.race([Promise.all(animPromises), delay(350)]);
    popups.forEach(p => p.remove());
  }

  // Update score and stats
  state.score += earned;
  state.totalClearedThisLevel += matches.size;
  updateHUD();

  // Create special tiles at designated positions, clear matched cells from state
  for (const [key, cellInfo] of matches) {
    const [r, c] = key.split(',').map(Number);
    if (cellInfo.createSpecial) {
      state.board[r][c] = { iconId: cellInfo.iconId, type: cellInfo.createSpecial };
    } else {
      state.board[r][c] = null;
    }
  }

  // Capture pre-gravity layout so we can calculate fall distances
  const preGravity = state.board.map(row => row.map(cell => cell ? { ...cell } : null));

  applyGravity();
  fillNewTiles();
  // renderBoard() resets all animation classes, so tiles are visible and clean
  renderBoard();

  // Phase 4: Animate tiles falling into position
  if (!prefersReduced) {
    const newTileEls = document.querySelectorAll('.tile');
    for (let c = 0; c < 8; c++) {
      for (let r = 0; r < 8; r++) {
        const preCell = preGravity[r][c];
        if (preCell) {
          // Tile existed before; count how many rows it drops
          let fallRows = 0;
          for (let dr = r + 1; dr < 8; dr++) {
            if (!preGravity[dr][c]) fallRows++;
          }
          if (fallRows > 0) {
            const newRow = r + fallRows;
            const idx = newRow * 8 + c;
            const el = newTileEls[idx];
            if (el) {
              el.style.setProperty('--fall-rows', fallRows);
              el.classList.add('anim-fall');
            }
          }
        } else {
          // Null position before gravity — new tile dropped in from above
          let nullsAbove = 0;
          for (let pr = 0; pr <= r; pr++) {
            if (!preGravity[pr][c]) nullsAbove++;
          }
          const idx = r * 8 + c;
          const el = newTileEls[idx];
          if (el && !el.classList.contains('anim-fall')) {
            el.style.setProperty('--fall-rows', nullsAbove);
            el.classList.add('anim-fall');
          }
        }
      }
    }
    await delay(300);
  }

  // Clean up fall animation classes so the board is in a neutral state
  document.querySelectorAll('.tile.anim-fall').forEach(el => {
    el.classList.remove('anim-fall');
    el.style.removeProperty('--fall-rows');
  });

  // Check for cascade: if the reshuffle created new matches, process them automatically
  const newMatches = findMatches();
  if (newMatches.size > 0) {
    state.comboCount++;
    await processMatches(newMatches);
  } else {
    checkWinLose();
  }
}

// ─── Special tile shake ───────────────────────────────────────────────────────
function startSpecialShake() {
  stopSpecialShake();
  specialShakeInterval = setInterval(() => {
    if (state.isAnimating) return;
    const specials = document.querySelectorAll('.tile.special-rowclear, .tile.special-bomb');
    specials.forEach(t => {
      if (
        Math.random() < SPECIAL_SHAKE_PROBABILITY &&
        !t.classList.contains('anim-special-shake') &&
        !t.classList.contains('anim-match') &&
        !t.classList.contains('anim-hint')
      ) {
        t.classList.add('anim-special-shake');
        t.addEventListener('animationend', () => t.classList.remove('anim-special-shake'), { once: true });
      }
    });
  }, SPECIAL_SHAKE_INTERVAL_MS);
}

function stopSpecialShake() {
  if (specialShakeInterval) {
    clearInterval(specialShakeInterval);
    specialShakeInterval = null;
  }
}

// ─── Swap animation ───────────────────────────────────────────────────────────
// Slides two tiles toward each other's grid positions via CSS transform, then
// clears inline styles so renderBoard() can snap everything to the correct state.
async function doSwapAnimation(r1, c1, r2, c2) {
  const boardEl = document.getElementById('board');
  const t1 = boardEl.querySelector(`[data-row="${r1}"][data-col="${c1}"]`);
  const t2 = boardEl.querySelector(`[data-row="${r2}"][data-col="${c2}"]`);
  if (!t1 || !t2) return;
  const rect1 = t1.getBoundingClientRect();
  const rect2 = t2.getBoundingClientRect();
  const dx = rect2.left - rect1.left;
  const dy = rect2.top - rect1.top;
  const duration = `${SWAP_ANIMATION_MS}ms`;
  t1.style.transition = `transform ${duration} cubic-bezier(0.4,0,0.2,1)`;
  t2.style.transition = `transform ${duration} cubic-bezier(0.4,0,0.2,1)`;
  t1.style.zIndex = '10';
  t2.style.zIndex = '9';
  t1.style.transform = `translate(${dx}px, ${dy}px)`;
  t2.style.transform = `translate(${-dx}px, ${-dy}px)`;
  await delay(SWAP_ANIMATION_MS);
  t1.style.cssText = '';
  t2.style.cssText = '';
}

// ─── Swap ─────────────────────────────────────────────────────────────────────
async function attemptSwap(r1, c1, r2, c2) {
  if (state.isAnimating) return;
  if (r1 < 0 || r1 >= 8 || c1 < 0 || c1 >= 8) return;
  if (r2 < 0 || r2 >= 8 || c2 < 0 || c2 >= 8) return;

  // Only orthogonal
  const dr = Math.abs(r1 - r2), dc = Math.abs(c1 - c2);
  if (!((dr === 1 && dc === 0) || (dr === 0 && dc === 1))) return;

  state.isAnimating = true;

  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Animate tiles sliding toward each other BEFORE touching the data model
  if (!prefersReduced) {
    await doSwapAnimation(r1, c1, r2, c2);
  }

  // Swap the data model
  [state.board[r1][c1], state.board[r2][c2]] = [state.board[r2][c2], state.board[r1][c1]];

  const matches = findMatches();

  if (matches.size === 0) {
    // Show swapped state (renderBoard clears transforms, shows new icon positions)
    renderBoard();
    if (!prefersReduced) {
      // Animate the swap back
      await doSwapAnimation(r1, c1, r2, c2);
    }
    // Restore data
    [state.board[r1][c1], state.board[r2][c2]] = [state.board[r2][c2], state.board[r1][c1]];
    state.selectedCell = null;
    renderBoard();
    if (!prefersReduced) {
      const t1 = document.querySelector(`[data-row="${r1}"][data-col="${c1}"]`);
      const t2 = document.querySelector(`[data-row="${r2}"][data-col="${c2}"]`);
      if (t1) { t1.classList.add('anim-bounce'); t1.addEventListener('animationend', () => t1.classList.remove('anim-bounce'), { once: true }); }
      if (t2) { t2.classList.add('anim-bounce'); t2.addEventListener('animationend', () => t2.classList.remove('anim-bounce'), { once: true }); }
      await delay(260);
    }
    state.isAnimating = false;
    return;
  }

  state.movesLeft--;
  state.comboCount = 0;
  state.selectedCell = null;
  renderBoard();
  updateHUD();
  await processMatches(matches);
  state.isAnimating = false;
}

// ─── Hint ─────────────────────────────────────────────────────────────────────
// Returns the first valid swap that produces a match, along with how many tiles would match.
function findHintMove() {
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (c + 1 < 8) {
        [state.board[r][c], state.board[r][c+1]] = [state.board[r][c+1], state.board[r][c]];
        const m = findMatches();
        [state.board[r][c], state.board[r][c+1]] = [state.board[r][c+1], state.board[r][c]];
        if (m.size > 0) return { r1: r, c1: c, r2: r, c2: c+1, matchSize: m.size };
      }
      if (r + 1 < 8) {
        [state.board[r][c], state.board[r+1][c]] = [state.board[r+1][c], state.board[r][c]];
        const m = findMatches();
        [state.board[r][c], state.board[r+1][c]] = [state.board[r+1][c], state.board[r][c]];
        if (m.size > 0) return { r1: r, c1: c, r2: r+1, c2: c, matchSize: m.size };
      }
    }
  }
  return null;
}

// ─── Win/lose check ───────────────────────────────────────────────────────────
function hasAnyValidMove() {
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      // Try horizontal swap
      if (c + 1 < 8) {
        [state.board[r][c], state.board[r][c+1]] = [state.board[r][c+1], state.board[r][c]];
        const m = findMatches();
        [state.board[r][c], state.board[r][c+1]] = [state.board[r][c+1], state.board[r][c]];
        if (m.size > 0) return true;
      }
      // Try vertical swap
      if (r + 1 < 8) {
        [state.board[r][c], state.board[r+1][c]] = [state.board[r+1][c], state.board[r][c]];
        const m = findMatches();
        [state.board[r][c], state.board[r+1][c]] = [state.board[r+1][c], state.board[r][c]];
        if (m.size > 0) return true;
      }
    }
  }
  return false;
}

function checkWinLose() {
  if (state.score >= state.scoreTarget) {
    showLevelSummary(true);
  } else if (state.movesLeft <= 0) {
    showLevelSummary(false);
  } else if (!hasAnyValidMove()) {
    state.isAnimating = true;
    showModal(
      '🚫 No More Moves',
      'No more moves available!',
      [
        { label: 'Restart Level', className: 'btn-primary', action: () => { state.isAnimating = false; initLevel(state.level); showScreen('screen-playing'); } },
        { label: 'Back to Menu', className: 'btn-secondary', action: () => { stopGameTimer(); state.isAnimating = false; showScreen('screen-start'); loadPersonalBests(); } },
      ]
    );
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function iconById(id) {
  return allIcons.find(ic => ic.id === id) || null;
}

function renderBoard() {
  const board = document.getElementById('board');
  const tiles = board.querySelectorAll('.tile');

  if (tiles.length !== 64) {
    // Build tiles from scratch
    board.innerHTML = '';
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        const div = document.createElement('div');
        div.className = 'tile';
        div.dataset.row = r;
        div.dataset.col = c;
        div.setAttribute('role', 'gridcell');
        div.setAttribute('tabindex', '0');
        const img = document.createElement('img');
        img.alt = '';
        img.loading = 'lazy';
        div.appendChild(img);
        board.appendChild(div);
      }
    }
  }

  const allTiles = board.querySelectorAll('.tile');
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const idx = r * 8 + c;
      const tile = allTiles[idx];
      const cell = state.board[r][c];
      const img = tile.querySelector('img');

      // Reset special classes and any lingering animation classes
      tile.classList.remove('selected', 'special-rowclear', 'special-bomb', 'anim-match', 'anim-fall', 'anim-new', 'anim-highlight', 'anim-hint', 'anim-special-shake');
      tile.style.removeProperty('--fall-rows');

      if (cell) {
        const icon = iconById(cell.iconId);
        if (icon) {
          img.src = icon.file;
          img.alt = '';
          tile.setAttribute('aria-label', icon.name);
        } else {
          img.src = '';
          tile.setAttribute('aria-label', cell.iconId);
        }

        if (cell.type === 'rowclear') tile.classList.add('special-rowclear');
        if (cell.type === 'bomb') tile.classList.add('special-bomb');
      } else {
        img.src = '';
        tile.setAttribute('aria-label', 'Empty');
      }

      if (state.selectedCell && state.selectedCell[0] === r && state.selectedCell[1] === c) {
        tile.classList.add('selected');
      }
    }
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  // Moves
  document.getElementById('moves-display').textContent = state.movesLeft;

  // Timer
  const timerEl = document.getElementById('timer-display');
  timerEl.textContent = formatTime(timeRemaining);
  if (timeRemaining < 30) {
    timerEl.classList.add('timer-warning');
  } else {
    timerEl.classList.remove('timer-warning');
  }

  // Progress jar: scaleY from 0→1 reveals the blue-to-gold gradient bottom-up
  const pct = Math.min(100, (state.score / state.scoreTarget) * 100);
  document.getElementById('progress-jar-fill').style.transform = `scaleY(${pct / 100})`;
  document.getElementById('progress-level-num').textContent = state.level;
  document.getElementById('jar-current-score').textContent = state.score.toLocaleString();
  document.getElementById('jar-target-score').textContent = state.scoreTarget.toLocaleString();

  // Current score ruler mark: starts at bottom (pct=0) and rises to top (pct=100)
  const markEl = document.getElementById('jar-mark-current');
  if (markEl) markEl.style.top = (100 - pct) + '%';

  // Tag badge
  const tagEl = document.getElementById('tag-badge');
  const tagLabel = state.activeTag === 'all' ? 'All Products' :
    state.activeTag.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  tagEl.textContent = state.activeTag === 'all' ? `🌐 ${tagLabel}` : `🏷️ ${tagLabel}`;
}

// ─── Screens ──────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

let summaryTimer = null;

function showLevelSummary(won) {
  stopGameTimer();
  if (summaryTimer) { clearTimeout(summaryTimer); summaryTimer = null; }

  const title = document.getElementById('summary-title');
  const emoji = document.getElementById('summary-emoji');
  const stats = document.getElementById('summary-stats');
  const timerEl = document.getElementById('summary-timer');
  const nextBtn = document.getElementById('btn-next-level');

  if (won) {
    title.textContent = 'Level Complete!';
    emoji.textContent = '🎉';
    nextBtn.textContent = 'Next Level →';
    nextBtn.style.display = '';

    updatePersonalBests();

    stats.innerHTML = `
      <div class="summary-stat"><span>Level</span><strong>${state.level}</strong></div>
      <div class="summary-stat"><span>Score</span><strong>${state.score.toLocaleString()}</strong></div>
      <div class="summary-stat"><span>Target</span><strong>${state.scoreTarget.toLocaleString()}</strong></div>
      <div class="summary-stat"><span>Logos Cleared</span><strong>${state.totalClearedThisLevel}</strong></div>
      <div class="summary-stat"><span>Moves Left</span><strong>${state.movesLeft}</strong></div>
    `;

    let countdown = 3;
    timerEl.textContent = `Auto-advancing in ${countdown}s…`;
    summaryTimer = setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        clearInterval(summaryTimer);
        summaryTimer = null;
        startNextLevel();
      } else {
        timerEl.textContent = `Auto-advancing in ${countdown}s…`;
      }
    }, 1000);
  } else {
    title.textContent = 'Level Failed';
    emoji.textContent = '😔';
    nextBtn.style.display = 'none';
    timerEl.textContent = '';
    stats.innerHTML = `
      <div class="summary-stat"><span>Level</span><strong>${state.level}</strong></div>
      <div class="summary-stat"><span>Score</span><strong>${state.score.toLocaleString()}</strong></div>
      <div class="summary-stat"><span>Target</span><strong>${state.scoreTarget.toLocaleString()}</strong></div>
      <div class="summary-stat"><span>Logos Cleared</span><strong>${state.totalClearedThisLevel}</strong></div>
    `;
    updatePersonalBests();
    showGameOver();
    return;
  }

  showScreen('screen-level-summary');
}

function startNextLevel() {
  if (summaryTimer) { clearInterval(summaryTimer); summaryTimer = null; }
  const nextLevel = state.level + 1;
  initLevel(nextLevel);
  showScreen('screen-playing');
}

function showGameOver() {
  const stats = document.getElementById('gameover-stats');
  const highscore = parseInt(localStorage.getItem(LS_HIGHSCORE) || '0');
  const games = parseInt(localStorage.getItem(LS_TOTALGAMES) || '0');
  const totalLogos = parseInt(localStorage.getItem(LS_TOTALLOGOS) || '0');

  stats.innerHTML = `
    <div class="summary-stat"><span>Final Score</span><strong>${state.score.toLocaleString()}</strong></div>
    <div class="summary-stat"><span>Level Reached</span><strong>${state.level}</strong></div>
    <div class="summary-stat"><span>All-Time Best</span><strong>${highscore.toLocaleString()}</strong></div>
    <div class="summary-stat"><span>Total Games</span><strong>${games}</strong></div>
    <div class="summary-stat"><span>Lifetime Logos</span><strong>${totalLogos.toLocaleString()}</strong></div>
  `;
  showScreen('screen-game-over');
}

// ─── Personal bests ───────────────────────────────────────────────────────────
function updatePersonalBests() {
  const hs = Math.max(state.score, parseInt(localStorage.getItem(LS_HIGHSCORE) || '0'));
  const hl = Math.max(state.level, parseInt(localStorage.getItem(LS_HIGHESTLEVEL) || '1'));
  const logos = parseInt(localStorage.getItem(LS_TOTALLOGOS) || '0') + state.totalClearedThisLevel;

  localStorage.setItem(LS_HIGHSCORE, hs);
  localStorage.setItem(LS_HIGHESTLEVEL, hl);
  localStorage.setItem(LS_TOTALLOGOS, logos);
}

function loadPersonalBests() {
  document.getElementById('pb-highscore').textContent = parseInt(localStorage.getItem(LS_HIGHSCORE) || '0').toLocaleString();
  document.getElementById('pb-level').textContent = localStorage.getItem(LS_HIGHESTLEVEL) || '1';
  document.getElementById('pb-games').textContent = localStorage.getItem(LS_TOTALGAMES) || '0';
  document.getElementById('pb-logos').textContent = parseInt(localStorage.getItem(LS_TOTALLOGOS) || '0').toLocaleString();
}

// ─── Input handlers ───────────────────────────────────────────────────────────
function handleTileClick(r, c) {
  if (state.isAnimating) return;

  if (state.selectedCell === null) {
    state.selectedCell = [r, c];
    renderBoard();
    return;
  }

  const [sr, sc] = state.selectedCell;
  if (sr === r && sc === c) {
    state.selectedCell = null;
    renderBoard();
    return;
  }

  const dr = Math.abs(sr - r), dc = Math.abs(sc - c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    attemptSwap(sr, sc, r, c);
  } else {
    state.selectedCell = [r, c];
    renderBoard();
  }
}

// Touch drag support
let touchStartX = 0, touchStartY = 0, touchStartR = -1, touchStartC = -1;

function setupBoardListeners() {
  const board = document.getElementById('board');

  board.addEventListener('click', e => {
    const tile = e.target.closest('.tile');
    if (!tile) return;
    handleTileClick(+tile.dataset.row, +tile.dataset.col);
  });

  board.addEventListener('keydown', e => {
    const tile = document.activeElement;
    if (!tile || !tile.classList.contains('tile')) return;
    const r = +tile.dataset.row;
    const c = +tile.dataset.col;

    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      handleTileClick(r, c);
      return;
    }

    let nr = r, nc = c;
    if (e.key === 'ArrowUp') { nr = r - 1; e.preventDefault(); }
    else if (e.key === 'ArrowDown') { nr = r + 1; e.preventDefault(); }
    else if (e.key === 'ArrowLeft') { nc = c - 1; e.preventDefault(); }
    else if (e.key === 'ArrowRight') { nc = c + 1; e.preventDefault(); }
    else return;

    if (nr < 0 || nr >= 8 || nc < 0 || nc >= 8) return;
    const nextTile = document.querySelector(`[data-row="${nr}"][data-col="${nc}"]`);
    if (nextTile) nextTile.focus();
  });

  board.addEventListener('touchstart', e => {
    const tile = e.target.closest('.tile');
    if (!tile) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartR = +tile.dataset.row;
    touchStartC = +tile.dataset.col;
  }, { passive: true });

  board.addEventListener('touchend', e => {
    if (touchStartR < 0) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);

    if (absDx < 10 && absDy < 10) {
      handleTileClick(touchStartR, touchStartC);
    } else if (absDx > absDy) {
      const dc = dx > 0 ? 1 : -1;
      attemptSwap(touchStartR, touchStartC, touchStartR, touchStartC + dc);
    } else {
      const dr = dy > 0 ? 1 : -1;
      attemptSwap(touchStartR, touchStartC, touchStartR + dr, touchStartC);
    }
    touchStartR = -1;
  }, { passive: true });
}

// ─── Mode selector ────────────────────────────────────────────────────────────
function setupModeSelector() {
  const container = document.getElementById('modeSelector');
  container.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    container.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', 'false'));
    btn.setAttribute('aria-pressed', 'true');
    state.activeTag = btn.dataset.tag;
    localStorage.setItem(LS_ACTIVETAG, state.activeTag);
  });
}

function restoreSavedTag() {
  const saved = localStorage.getItem(LS_ACTIVETAG);
  if (!saved) return;
  const container = document.getElementById('modeSelector');
  const btn = container.querySelector(`button[data-tag="${CSS.escape(saved)}"]`);
  if (!btn) return;
  container.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', 'false'));
  btn.setAttribute('aria-pressed', 'true');
  state.activeTag = saved;
}

// ─── Play button ──────────────────────────────────────────────────────────────
function setupPlayButton() {
  document.getElementById('btn-play').addEventListener('click', () => {
    localStorage.setItem(LS_ACTIVETAG, state.activeTag);
    const games = parseInt(localStorage.getItem(LS_TOTALGAMES) || '0') + 1;
    localStorage.setItem(LS_TOTALGAMES, games);
    initLevel(1);
    showScreen('screen-playing');
  });

  document.getElementById('btn-menu').addEventListener('click', () => {
    if (state.isAnimating) return;
    showModal(
      'Quit Game?',
      'Quit this game? Your progress will be lost.',
      [
        { label: 'Cancel', className: 'btn-secondary', action: () => {} },
        { label: 'Back to Menu', className: 'btn-danger', action: () => { stopGameTimer(); showScreen('screen-start'); loadPersonalBests(); } },
      ]
    );
  });

  document.getElementById('btn-hint').addEventListener('click', () => {
    if (state.isAnimating) return;
    const hint = findHintMove();
    if (!hint) return;

    // Deduct the point value of the hinted combo (min 0) — even if the player doesn't play it
    const cost = hint.matchSize * PER_TILE_PTS;
    state.score = Math.max(0, state.score - cost);
    updateHUD();

    // Highlight the two tiles that should be swapped
    const t1 = document.querySelector(`[data-row="${hint.r1}"][data-col="${hint.c1}"]`);
    const t2 = document.querySelector(`[data-row="${hint.r2}"][data-col="${hint.c2}"]`);
    if (t1) { t1.classList.add('anim-hint'); setTimeout(() => t1.classList.remove('anim-hint'), HINT_ANIMATION_MS); }
    if (t2) { t2.classList.add('anim-hint'); setTimeout(() => t2.classList.remove('anim-hint'), HINT_ANIMATION_MS); }
  });

  document.getElementById('btn-next-level').addEventListener('click', () => {
    if (summaryTimer) { clearInterval(summaryTimer); summaryTimer = null; }
    startNextLevel();
  });

  document.getElementById('btn-play-again').addEventListener('click', () => {
    showScreen('screen-start');
    loadPersonalBests();
  });
}

// ─── Hue auto-detection ───────────────────────────────────────────────────────
function hexToHsl(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  const l = (max + min) / 2;
  const s = d === 0 ? 0 : (l > 0.5 ? d / (2 - max - min) : d / (max + min));
  return [h * 360, s, l];
}

async function detectIconHues() {
  // Thresholds for filtering out near-achromatic colours when detecting dominant hue.
  const MIN_LIGHTNESS  = 0.1;  // ignore near-black (lightness below 10%)
  const MAX_LIGHTNESS  = 0.9;  // ignore near-white (lightness above 90%)
  const MIN_SATURATION = 0.15; // ignore near-grey  (saturation below 15%)

  const fetchIcon = async (icon) => {
    try {
      const res = await fetch(icon.file);
      if (!res.ok) return;
      const text = await res.text();
      const fills = [...text.matchAll(/fill="#([0-9a-fA-F]{6})"/g)].map(m => '#' + m[1]);
      const counts = {};
      for (const f of fills) {
        const [h, s, l] = hexToHsl(f);
        if (l < MIN_LIGHTNESS || l > MAX_LIGHTNESS || s < MIN_SATURATION) continue;
        counts[h] = (counts[h] || 0) + 1;
      }
      let bestHue = null, bestCount = 0;
      for (const [h, cnt] of Object.entries(counts)) {
        if (cnt > bestCount) { bestCount = cnt; bestHue = parseFloat(h); }
      }
      if (bestHue !== null) icon.hue = bestHue;
    } catch (e) { /* ignore */ }
  };
  await Promise.all(allIcons.map(fetchIcon));
}

// ─── Bootstrap ────────────────────────────────────────────────────────────────
async function init() {
  await loadManifest();
  loadPersonalBests();
  setupModeSelector();
  restoreSavedTag();
  setupBoardListeners();
  setupPlayButton();
  showScreen('screen-start');
  // Defer hue detection until the browser is idle to avoid impacting initial load
  // performance metrics (TBT/LCP). If the player starts level 1 before detection
  // completes, buildPool falls back to random selection; later levels benefit from hues.
  if ('requestIdleCallback' in window) {
    requestIdleCallback(() => detectIconHues());
  } else {
    setTimeout(() => detectIconHues(), 2000);
  }
}

init();
</script>
