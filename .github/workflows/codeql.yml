name: CodeQL Security Analysis

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    # Run a full scan every Monday at 08:00 UTC to catch newly published CVEs
    - cron: '0 8 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL – JavaScript security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # CodeQL works on source files. Our entire JS lives inside index.html.
      # Extract the inline <script> block so CodeQL can analyse it as a .js file.
      - name: Extract inline JS from index.html
        run: |
          python3 - <<'PYEOF'
          import re, sys

          with open("index.html", encoding="utf-8") as f:
            html = f.read()

          match = re.search(r'<script[^>]*>(.*?)</script>', html, re.DOTALL)
          if not match:
            print("No <script> block found in index.html")
            sys.exit(1)

          with open("game.js", "w", encoding="utf-8") as f:
            f.write(match.group(1))

          print(f"Extracted {len(match.group(1))} chars → game.js")
          PYEOF

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # Use the security-and-quality query suite for broader coverage
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript
