name: Lint

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  html-lint:
    name: HTML validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install --global htmlhint@1

      - name: Lint index.html
        # Rules tuned for the single-file static game.
        # inline-script-disabled is intentionally not enforced because the
        # whole game JS lives in an inline <script> (no build step by design).
        run: |
          htmlhint index.html \
            --rules='doctype-first:true,doctype-html5:true,html-lang-require:true,\
          head-script-disabled:false,img-alt-require:true,\
          id-unique:true,attr-no-duplication:true,\
          spec-char-escape:false,tag-pair:true,tags-check:false,\
          title-require:true'

  js-check:
    name: JavaScript syntax & quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Extract the inline <script> block so Node can check it in isolation.
      - name: Extract inline JS from index.html
        run: |
          python3 - <<'PYEOF'
          import re, sys

          with open("index.html", encoding="utf-8") as f:
            html = f.read()

          # Extract everything between <script> and </script>
          match = re.search(r'<script[^>]*>(.*?)</script>', html, re.DOTALL)
          if not match:
            print("No <script> block found in index.html")
            sys.exit(1)

          with open("/tmp/game.js", "w", encoding="utf-8") as f:
            f.write(match.group(1))

          print(f"Extracted {len(match.group(1))} chars of JS to /tmp/game.js")
          PYEOF

      - name: Node.js syntax check (parse errors)
        run: node --check /tmp/game.js

      - name: Install ESLint
        run: npm install --global eslint@8

      - name: Run ESLint
        run: |
          eslint /tmp/game.js \
            --no-eslintrc \
            --env browser,es2022 \
            --parser-options=ecmaVersion:2022 \
            --rule 'no-undef:off' \
            --rule 'no-unused-vars:warn' \
            --rule 'no-eval:error' \
            --rule 'no-implied-eval:error' \
            --rule 'no-new-func:error' \
            --rule 'no-script-url:error' \
            --rule 'no-prototype-builtins:warn' \
            --rule 'eqeqeq:warn' \
            --rule 'no-var:warn' \
            --max-warnings=20

  page-weight:
    name: Page weight guard (index.html < 200 KB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check index.html size
        run: |
          SIZE=$(wc -c < index.html)
          LIMIT=204800   # 200 KB in bytes
          echo "index.html size: $SIZE bytes (limit: $LIMIT bytes)"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "❌  index.html exceeds 200 KB — keep the game logic lean and the page weight low"
            exit 1
          fi
          echo "✅  Page weight OK"

      - name: Verify no hard-coded external CDN scripts
        # GoatCounter is conditionally loaded only when GOATCOUNTER_CODE is set;
        # this check ensures no other always-on external script tags are present.
        run: |
          python3 - <<'PYEOF'
          import re, sys

          with open("index.html", encoding="utf-8") as f:
            html = f.read()

          # Find <script src="..."> tags pointing to external origins
          external_scripts = re.findall(
            r'<script[^>]+src=["\']https?://[^"\']+["\']',
            html, re.IGNORECASE
          )
          # Allow conditional GoatCounter snippet patterns — they are injected
          # dynamically from JS only when GOATCOUNTER_CODE is non-empty.
          forbidden = [s for s in external_scripts if "goatcounter" not in s.lower()]

          if forbidden:
            print("❌  Hard-coded external <script src> found — remove CDN dependencies:")
            for s in forbidden:
              print(f"   {s}")
            sys.exit(1)

          # Find <link rel="stylesheet" href="https://..."> external styles
          external_styles = re.findall(
            r'<link[^>]+href=["\']https?://[^"\']+["\'][^>]*rel=["\']stylesheet["\']'
            r'|<link[^>]+rel=["\']stylesheet["\'][^>]*href=["\']https?://[^"\']+["\']',
            html, re.IGNORECASE
          )
          if external_styles:
            print("❌  External stylesheet <link> found — all CSS must be inline:")
            for s in external_styles:
              print(f"   {s}")
            sys.exit(1)

          print("✅  No hard-coded external CDN resources found")
          PYEOF
